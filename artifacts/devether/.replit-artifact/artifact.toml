kind = "web"
previewPath = "/"
title = "DevEther"
version = "1.0.0"
id = "artifacts/devether"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24003

[services.development]
run = "pnpm --filter @workspace/devether run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devether", "run", "build" ]
publicDir = "artifacts/devether/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24003"
BASE_PATH = "/"
