openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: DevEther API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rifts
    description: Rift room operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /rifts:
    get:
      operationId: listRifts
      tags: [rifts]
      summary: List active rifts
      responses:
        "200":
          description: List of active rifts
          content:
            application/json:
              schema:
                type: object
                properties:
                  rifts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Rift"
                required:
                  - rifts
  /rifts/join:
    post:
      operationId: joinRift
      tags: [rifts]
      summary: Join or create a rift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRiftRequest"
      responses:
        "200":
          description: Joined rift successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinRiftResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Rift:
      type: object
      properties:
        id:
          type: string
        topic:
          type: string
        isQuantum:
          type: boolean
        userCount:
          type: integer
        maxUsers:
          type: integer
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        vibeColor:
          type: string
        temperature:
          type: number
        isChaosMode:
          type: boolean
      required:
        - id
        - topic
        - isQuantum
        - userCount
        - maxUsers
        - createdAt
        - expiresAt
        - vibeColor
        - temperature
        - isChaosMode
    JoinRiftRequest:
      type: object
      properties:
        username:
          type: string
        topic:
          type: string
        riftId:
          type: string
        quantum:
          type: boolean
        asRadio:
          type: boolean
      required:
        - username
        - topic
    JoinRiftResponse:
      type: object
      properties:
        riftId:
          type: string
        userId:
          type: string
        userColor:
          type: string
        asRadio:
          type: boolean
        rift:
          $ref: "#/components/schemas/Rift"
      required:
        - riftId
        - userId
        - userColor
        - asRadio
        - rift
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
